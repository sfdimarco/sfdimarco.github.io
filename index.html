// ── Animated synesthesia number grid ──────────────────────────────────────
const COLS = 20, ROWS = 9;
function useSynGrid() {
  const [cells, setCells] = useState(() =>
    Array.from({ length: ROWS * COLS }, () => ({
      d: String(Math.floor(Math.random() * 10)),
      op: Math.random() * 0.28 + 0.05,
      ph: Math.random() * Math.PI * 2,
      sp: Math.random() * 0.4 + 0.15,
    }))
  );
  useEffect(() => {
    let raf, t = 0;
    const tick = () => {
      t += 0.012;
      setCells(p => p.map(c => ({
        ...c,
        d: Math.random() < 0.002 ? String(Math.floor(Math.random() * 10)) : c.d,
        op: 0.05 + Math.abs(Math.sin(t * c.sp + c.ph)) * 0.3,
      })));
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);
  return cells;
}

function SynGrid({ style }) {
  const cells = useSynGrid();
  return (
    <div style={{ display:"grid", gridTemplateColumns:`repeat(${COLS},1fr)`, gridTemplateRows:`repeat(${ROWS},1fr)`, width:"100%", height:"100%", userSelect:"none", pointerEvents:"none", ...style }}>
      {cells.map((c,i) => (
        <div key={i} style={{ display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'Space Mono',monospace", fontSize:"clamp(9px,1.1vw,15px)", fontWeight:700, color:SYN[c.d], opacity:c.op, transition:"opacity 0.5s" }}>{c.d}</div>
      ))}
    </div>
  );
}

// ── Live waveform canvas ───────────────────────────────────────────────────
function Waveform({ accent }) {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let t = 0, raf;
    const draw = () => {
      const { width: w, height: h } = canvas;
      ctx.clearRect(0, 0, w, h);
      ctx.strokeStyle = accent; ctx.lineWidth = 2;
      ctx.shadowBlur = 10; ctx.shadowColor = accent;
      ctx.beginPath();
      for (let x = 0; x < w; x++) {
        const y = h/2 + Math.sin(x*0.03+t)*h*0.28 + Math.sin(x*0.07+t*1.7)*h*0.1 + Math.sin(x*0.015+t*0.5)*h*0.08;
        x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      ctx.stroke(); t += 0.04;
      raf = requestAnimationFrame(draw);
    };
    raf = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(raf);
  }, [accent]);
  return <canvas ref={ref} width={700} height={64} style={{ width:"100%", height:64, borderRadius:8, background:accent+"0a" }} />;
}

// ── Section waveform divider ─────────────────────────────────────────────────
function SectionWave({ accent, speed=1, complexity=1, height=48 }) {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let t = 0, raf;
    const draw = () => {
      const { width: w, height: h } = canvas;
      ctx.clearRect(0, 0, w, h);
      // glow pass
      ctx.save();
      ctx.strokeStyle = accent; ctx.lineWidth = 1.5;
      ctx.shadowBlur = 18; ctx.shadowColor = accent; ctx.globalAlpha = 0.45;
      ctx.beginPath();
      for (let x = 0; x < w; x++) {
        const y = h/2
          + Math.sin(x*0.018*complexity + t*speed)*h*0.3
          + Math.sin(x*0.045*complexity + t*speed*1.6)*h*0.12
          + Math.sin(x*0.009*complexity + t*speed*0.7)*h*0.1;
        x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      ctx.stroke(); ctx.restore();
      // crisp pass
      ctx.strokeStyle = accent; ctx.lineWidth = 1.5;
      ctx.shadowBlur = 0; ctx.globalAlpha = 0.7;
      ctx.beginPath();
      for (let x = 0; x < w; x++) {
        const y = h/2
          + Math.sin(x*0.018*complexity + t*speed)*h*0.3
          + Math.sin(x*0.045*complexity + t*speed*1.6)*h*0.12
          + Math.sin(x*0.009*complexity + t*speed*0.7)*h*0.1;
        x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      ctx.stroke();
      t += 0.025; raf = requestAnimationFrame(draw);
    };
    raf = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(raf);
  }, [accent, speed, complexity]);
  return (
    <canvas ref={ref} width={1200} height={height}
      style={{ width:"100%", height, display:"block", pointerEvents:"none", opacity:0.55 }} />
  );
}

}

// ── Gamut cursor + click ripple ──────────────────────────────────────────────
function GamutCursor() {
  const canvasRef = useRef(null);
  const state = useRef({ mx:0, my:0, ripples:[], t:0 });

  useEffect(() => {
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const synColors = Object.values(SYN);
    const RING_R = 18, SEGS = synColors.length;

    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    resize();
    window.addEventListener("resize", resize);

    const onMove = e => { state.current.mx = e.clientX; state.current.my = e.clientY; };
    const onClick = e => {
      state.current.ripples.push({ x:e.clientX, y:e.clientY, r:0, maxR:60, alpha:0.7 });
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("click", onClick);

    let raf;
    const draw = () => {
      const { mx, my, ripples, t: time } = state.current;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // ripples
      for (let i = ripples.length-1; i >= 0; i--) {
        const rp = ripples[i];
        rp.r += 3; rp.alpha -= 0.025;
        if (rp.alpha <= 0) { ripples.splice(i,1); continue; }
        const seg = Math.floor((rp.r / rp.maxR) * SEGS) % SEGS;
        ctx.beginPath();
        ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI*2);
        ctx.strokeStyle = synColors[seg];
        ctx.lineWidth = 2;
        ctx.globalAlpha = rp.alpha;
        ctx.shadowBlur = 10; ctx.shadowColor = synColors[seg];
        ctx.stroke();
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;
      }

      // spinning SYN ring
      for (let i = 0; i < SEGS; i++) {
        const angle = (i / SEGS) * Math.PI * 2 + state.current.t;
        const nextAngle = ((i+1) / SEGS) * Math.PI * 2 + state.current.t;
        ctx.beginPath();
        ctx.arc(mx, my, RING_R, angle, nextAngle);
        ctx.strokeStyle = synColors[i];
        ctx.lineWidth = 3;
        ctx.shadowBlur = 8; ctx.shadowColor = synColors[i];
        ctx.globalAlpha = 0.9;
        ctx.stroke();
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;
      }

      // center dot
      ctx.beginPath();
      ctx.arc(mx, my, 2, 0, Math.PI*2);
      ctx.fillStyle = "#fff"; ctx.globalAlpha = 0.8;
      ctx.fill(); ctx.globalAlpha = 1;

      state.current.t += 0.04;
      raf = requestAnimationFrame(draw);
    };
    raf = requestAnimationFrame(draw);

    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener("resize", resize);
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("click", onClick);
    };
  }, []);

  return (
    <canvas ref={canvasRef}
      style={{ position:"fixed", top:0, left:0, pointerEvents:"none", zIndex:9999, cursor:"none" }} />
  );
}

  {label:"Java / Swing",color:SYN["2"]},{label:"Three.js / WebGL",color:SYN["0"]},
  {label:"STEM Curriculum Design",color:SYN["3"]},{label:"MagicSchool AI Certified",color:SYN["3"]},

// ── Project card ───────────────────────────────────────────────────────────
function ProjectCard({ p, isWide }) {
  const [hov, setHov] = useState(false);
  return (
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ gridColumn:isWide?"1 / -1":"auto", background:hov?"#0f0f0f":"#090909", border:`1px solid ${hov?p.accent+"66":"#1e1e1e"}`, borderRadius:14, overflow:"hidden", transition:"all 0.3s", cursor:"default", position:"relative", boxShadow:hov?`0 0 28px ${p.accent}28, 0 2px 44px ${p.accent}18, inset 0 0 0 1px ${p.accent}11`:"none" }}>
      <div style={{ position:"absolute", top:0, left:0, right:0, height:2, background:hov?`linear-gradient(90deg,transparent,${p.accent},transparent)`:"transparent", transition:"all 0.35s" }} />

      {(p.image||p.renderMedia) && (
        <div style={{ overflow:"hidden", position:"relative" }}>
          {p.renderMedia ? p.renderMedia(p.accent) : (
            <div style={{ height:isWide?260:200 }}>
              <ImgSlot src={p.image} alt={p.imageAlt} accent={p.accent} label={p.imageLabel} style={{ height:"100%" }} />
            </div>
          )}
          {!p.renderMedia && (
            <div style={{ position:"absolute", top:10, right:12, background:`${p.accent}22`, border:`1px solid ${p.accent}44`, color:p.accent, fontFamily:"'Space Mono',monospace", fontSize:9, letterSpacing:3, padding:"3px 8px", borderRadius:4 }}>{p.cat}</div>
          )}
        </div>
      )}

      <div style={{ padding:"20px 24px 24px" }}>
        {!p.image&&!p.renderMedia&&(
          <div style={{ fontSize:9, color:p.accent, letterSpacing:4, fontFamily:"'Space Mono',monospace", marginBottom:10 }}>{p.cat}</div>
        )}
        <div style={{ fontFamily:"'DM Serif Display',Georgia,serif", fontSize:isWide?"clamp(20px,2.5vw,28px)":"clamp(17px,2vw,22px)", color:"#fff", lineHeight:1.15, marginBottom:6 }}>{p.title}</div>
        <div style={{ color:p.accent, fontFamily:"'Space Mono',monospace", fontSize:11, fontStyle:"italic", marginBottom:14 }}>{p.tagline}</div>
        <p style={{ color:"#777", fontSize:13, lineHeight:1.75, margin:"0 0 18px", maxWidth:isWide?640:400 }}>{p.desc}</p>
        <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:p.cta?18:0 }}>
          {p.tags.map(t=><Tag key={t} color={p.accent}>{t}</Tag>)}
        </div>
        {p.cta&&(
          p.ctaHref
            ? <a href={p.ctaHref} target={p.ctaTarget||"_self"} style={{ display:"inline-flex", alignItems:"center", gap:8, background:p.accent, color:"#000", fontFamily:"'Space Mono',monospace", fontWeight:700, fontSize:11, letterSpacing:2, padding:"9px 20px", borderRadius:6, textDecoration:"none", marginTop:4 }}>▶ {p.cta}</a>
            : <span style={{ display:"inline-flex", alignItems:"center", gap:8, background:"transparent", color:p.accent, border:`1px solid ${p.accent}55`, fontFamily:"'Space Mono',monospace", fontWeight:700, fontSize:11, letterSpacing:2, padding:"9px 20px", borderRadius:6, marginTop:4, opacity:0.7 }}>⏳ {p.cta}</span>
        )}
      </div>
    </div>
  );
}

root.render(<App />);
