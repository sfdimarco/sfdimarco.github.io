<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Geometry Dash - Full Screen Fixed</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden; 
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation; 
        }
        
        #game-container {
            background-color: #1a1a1a;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* This is a special CSS rule for when the game goes FULL SCREEN */
        #game-container:fullscreen {
            padding: 0;
            margin: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            margin: 0 auto;
            transition: background 1.5s ease; 
            border-bottom: 10px solid #22c55e;
            max-width: 100%;
            height: auto;
            cursor: pointer;
        }
        .shadow-text {
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="game-container" class="p-4 rounded-xl">
        
        <div id="game-ui" class="text-white text-center mb-4">
            <h1 class="text-4xl font-bold mb-1">🐾 CAT DASH 🐾</h1>
            <div class="flex justify-center gap-8 items-center">
                <div id="level-display" class="text-xl font-bold text-yellow-400">Level: 1</div>
                <div id="score-board" class="text-xl font-mono">Score: 0</div>
            </div>
            <div id="control-hint" class="text-sm text-yellow-200 mt-1 italic">Press Space to Jump!</div>
        </div>

        <div class="relative">
            <canvas id="gameCanvas"></canvas>
            
            <div id="level-up-msg" class="hidden absolute inset-0 flex items-center justify-center pointer-events-none">
                <h2 class="text-6xl font-black text-white italic animate-bounce shadow-text">NEW MODE!</h2>
            </div>

            <div id="restart-screen" class="hidden absolute inset-0 bg-black/70 flex flex-col items-center justify-center text-white rounded-lg">
                <h2 class="text-5xl font-black mb-4">MEOW-CH!</h2>
                <p id="final-score" class="text-2xl mb-6">Score: 0</p>
                <button id="restart-btn" class="bg-orange-500 hover:bg-orange-400 text-white font-bold py-3 px-8 rounded-full text-xl transition-transform active:scale-95 shadow-lg">
                    TRY AGAIN
                </button>
            </div>
        </div>

        <div class="mt-4 flex justify-center">
            <button id="fullscreen-btn" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold py-2 px-4 rounded-lg flex items-center gap-2 transition-all active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M1.5 1a.5.5 0 0 0-.5.5v4a.5.5 0 0 1-1 0v-4A1.5 1.5 0 0 1 1.5 0h4a.5.5 0 0 1 0 1h-4zM10 .5a.5.5 0 0 1 .5-.5h4A1.5 1.5 0 0 1 16 1.5v4a.5.5 0 0 1-1 0v-4a.5.5 0 0 0-.5-.5h-4a.5.5 0 0 1-.5-.5zM.5 10a.5.5 0 0 1 .5.5v4a.5.5 0 0 0 .5.5h4a.5.5 0 0 1 0 1h-4A1.5 1.5 0 0 1 0 14.5v-4a.5.5 0 0 1 .5-.5zm15 0a.5.5 0 0 1 .5.5v4a1.5 1.5 0 0 1-1.5 1.5h-4a.5.5 0 0 1 0-1h4a.5.5 0 0 0 .5-.5v-4a.5.5 0 0 1 .5-.5z"/>
                </svg>
                GO FULL SCREEN
            </button>
        </div>
    </div>

    <div id="error-msg" class="hidden mt-4 text-red-400 text-xs italic bg-red-900/20 p-2 rounded">
        Oops! Your browser blocked Full Screen. Try clicking the game first!
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d'); 
        const gameContainer = document.getElementById('game-container');
        const scoreBoard = document.getElementById('score-board');
        const levelDisplay = document.getElementById('level-display');
        const restartScreen = document.getElementById('restart-screen');
        const restartBtn = document.getElementById('restart-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const finalScoreLabel = document.getElementById('final-score');
        const levelUpMsg = document.getElementById('level-up-msg');
        const controlHint = document.getElementById('control-hint');
        const errorMsg = document.getElementById('error-msg');

        const GRAVITY = 0.65;        
        const ARROW_GRAVITY = 0.4;  
        const JUMP_FORCE = -11.5;    
        const THRUST_FORCE = -0.8;   
        const GROUND_HEIGHT = 50;    
        const CAT_SIZE = 40;         
        
        const levels = [
            { 
                name: "Autumn Forest", threshold: 0, mode: 'cube',
                bg: 'linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%)', 
                ground: '#166534', speed: 5, leafColors: ['#e67e22', '#d35400', '#f1c40f']
            },
            { 
                name: "Midnight Alley", threshold: 10, mode: 'cube',
                bg: 'linear-gradient(to bottom, #1e3a8a 0%, #1e1b4b 100%)', 
                ground: '#334155', speed: 7, leafColors: ['#94a3b8', '#64748b', '#475569']
            },
            { 
                name: "Sunset Rooftops", threshold: 25, mode: 'cube',
                bg: 'linear-gradient(to bottom, #fb923c 0%, #be123c 100%)', 
                ground: '#450a0a', speed: 9, leafColors: ['#f87171', '#ef4444', '#b91c1c']
            },
            { 
                name: "Arrow Space!", threshold: 45, mode: 'arrow',
                bg: 'linear-gradient(to bottom, #000000 0%, #4c1d95 100%)', 
                ground: '#0f172a', speed: 10, leafColors: ['#ffffff', '#818cf8', '#c084fc']
            }
        ];

        let gameActive = true;       
        let score = 0;               
        let currentLevelIndex = 0;   
        let gameSpeed = levels[0].speed; 
        let frameCount = 0;          
        let isHoldingJump = false;   

        const cat = {
            x: 80,                   
            y: 0,                    
            width: CAT_SIZE,
            height: CAT_SIZE,
            velocityY: 0,            
            isGrounded: false,       
            rotation: 0,             
            color: '#fbbf24'         
        };

        let obstacles = [];
        let leaves = [];

        function init() {
            handleResize();
            cat.y = canvas.height - GROUND_HEIGHT - cat.height;
            cat.velocityY = 0;
            cat.rotation = 0;
            obstacles = [];
            leaves = [];
            score = 0;
            currentLevelIndex = 0;
            updateLevelStyle();
            gameActive = true;
            restartScreen.classList.add('hidden');
            for(let i=0; i<15; i++) spawnLeaf(Math.random() * canvas.width);
            requestAnimationFrame(gameLoop);
        }

        function updateLevelStyle() {
            const level = levels[currentLevelIndex];
            canvas.style.background = level.bg;
            canvas.style.borderBottomColor = level.ground;
            gameSpeed = level.speed;
            levelDisplay.innerText = `Level ${currentLevelIndex + 1}: ${level.name}`;
            
            if (level.mode === 'arrow') {
                controlHint.innerText = "HOLD Space to Fly UP!";
                controlHint.classList.add('text-purple-300');
            } else {
                controlHint.innerText = "Press Space to Jump!";
                controlHint.classList.remove('text-purple-300');
            }
        }

        function checkLevelUp() {
            if (currentLevelIndex < levels.length - 1) {
                const nextLevel = levels[currentLevelIndex + 1];
                if (score >= nextLevel.threshold) {
                    currentLevelIndex++;
                    updateLevelStyle();
                    showLevelUpAnimation();
                }
            }
        }

        function showLevelUpAnimation() {
            levelUpMsg.classList.remove('hidden');
            setTimeout(() => levelUpMsg.classList.add('hidden'), 2000);
        }

        function spawnLeaf(xPos = canvas.width) {
            const colors = levels[currentLevelIndex].leafColors;
            leaves.push({
                x: xPos,
                y: Math.random() * (canvas.height - 100),
                size: 5 + Math.random() * 10,
                speedX: 1 + Math.random() * 2,
                speedY: Math.random() * 1,
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.1,
                color: colors[Math.floor(Math.random() * colors.length)]
            });
        }

        function createObstacle() {
            const currentMode = levels[currentLevelIndex].mode;
            const size = 30 + Math.random() * 20;
            const isTop = (currentMode === 'arrow' && Math.random() > 0.5);
            obstacles.push({
                x: canvas.width,
                y: isTop ? 0 : canvas.height - GROUND_HEIGHT - size,
                width: size,
                height: size,
                type: Math.random() > 0.4 ? 'spike' : 'block',
                isTop: isTop
            });
        }

        function drawLeaf(leaf) {
            ctx.save();
            ctx.translate(leaf.x, leaf.y);
            ctx.rotate(leaf.rotation);
            ctx.fillStyle = leaf.color;
            ctx.beginPath();
            ctx.ellipse(0, 0, leaf.size, leaf.size/2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawCat() {
            ctx.save();
            ctx.translate(cat.x + cat.width/2, cat.y + cat.height/2);
            const mode = levels[currentLevelIndex].mode;
            
            if (mode === 'arrow') {
                ctx.rotate(cat.velocityY * 0.05);
                ctx.fillStyle = '#94a3b8';
                ctx.fillRect(-cat.width/2 - 5, -cat.height/4, cat.width + 10, cat.height/2);
                ctx.fillStyle = cat.color;
                ctx.fillRect(-10, -15, 20, 20);
                // Ears
                ctx.beginPath();
                ctx.moveTo(-10, -15); ctx.lineTo(-13, -22); ctx.lineTo(-3, -15); ctx.fill();
                ctx.beginPath();
                ctx.moveTo(10, -15); ctx.lineTo(13, -22); ctx.lineTo(3, -15); ctx.fill();
                
                if (isHoldingJump) {
                    ctx.fillStyle = '#fb923c';
                    ctx.beginPath();
                    ctx.moveTo(-cat.width/2 - 10, 0);
                    ctx.lineTo(-cat.width/2 - 25, -5);
                    ctx.lineTo(-cat.width/2 - 25, 5);
                    ctx.fill();
                }
            } else {
                ctx.rotate(cat.rotation);
                ctx.fillStyle = cat.color;
                ctx.fillRect(-cat.width/2, -cat.height/2, cat.width, cat.height);
                // Ears
                ctx.beginPath();
                ctx.moveTo(-cat.width/2, -cat.height/2); ctx.lineTo(-cat.width/2 - 5, -cat.height/2 - 10); ctx.lineTo(-cat.width/2 + 10, -cat.height/2); ctx.fill();
                ctx.beginPath();
                ctx.moveTo(cat.width/2, -cat.height/2); ctx.lineTo(cat.width/2 + 5, -cat.height/2 - 10); ctx.lineTo(cat.width/2 - 10, -cat.height/2); ctx.fill();
            }
            ctx.fillStyle = 'black';
            ctx.fillRect(2, -8, 4, 4); ctx.fillRect(-8, -8, 4, 4);
            ctx.restore();
        }

        function update() {
            if (!gameActive) return;
            const mode = levels[currentLevelIndex].mode;
            leaves.forEach((leaf, index) => {
                leaf.x -= (gameSpeed * 0.5) + leaf.speedX;
                leaf.y += Math.sin(frameCount * 0.05) * 0.5 + leaf.speedY;
                if (leaf.x + leaf.size < 0) { leaves.splice(index, 1); spawnLeaf(); }
            });

            if (mode === 'arrow') {
                if (isHoldingJump) cat.velocityY += THRUST_FORCE;
                else cat.velocityY += ARROW_GRAVITY;
                cat.velocityY = Math.max(-8, Math.min(8, cat.velocityY));
                cat.y += cat.velocityY;
                if (cat.y < 0) { cat.y = 0; cat.velocityY = 0; }
                const floorY = canvas.height - GROUND_HEIGHT - cat.height;
                if (cat.y > floorY) { cat.y = floorY; cat.velocityY = 0; }
            } else {
                cat.velocityY += GRAVITY;
                cat.y += cat.velocityY;
                const floorY = canvas.height - GROUND_HEIGHT - cat.height;
                if (cat.y > floorY) {
                    cat.y = floorY; cat.velocityY = 0; cat.isGrounded = true;
                    cat.rotation = Math.round(cat.rotation / (Math.PI/2)) * (Math.PI/2);
                } else { cat.isGrounded = false; cat.rotation += 0.15; }
            }

            obstacles.forEach((obs, index) => {
                obs.x -= gameSpeed;
                if (cat.x < obs.x + obs.width - 5 && cat.x + cat.width > obs.x + 5 &&
                    cat.y < obs.y + obs.height - 5 && cat.y + cat.height > obs.y + 5) { gameOver(); }
                if (obs.x + obs.width < 0) {
                    obstacles.splice(index, 1); score++;
                    scoreBoard.innerText = `Score: ${score}`; checkLevelUp();
                }
            });
            frameCount++;
            const spawnRate = Math.max(35, 90 - (currentLevelIndex * 15));
            if (frameCount % spawnRate === 0) createObstacle();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            leaves.forEach(drawLeaf);
            ctx.fillStyle = levels[currentLevelIndex].ground;
            ctx.fillRect(0, canvas.height - GROUND_HEIGHT, canvas.width, GROUND_HEIGHT);
            obstacles.forEach(obs => {
                ctx.fillStyle = obs.isTop ? '#f43f5e' : (currentLevelIndex === 3 ? '#a855f7' : '#ef4444');
                ctx.beginPath();
                if (obs.isTop) { ctx.moveTo(obs.x, obs.y); ctx.lineTo(obs.x + obs.width / 2, obs.y + obs.height); ctx.lineTo(obs.x + obs.width, obs.y); }
                else { ctx.moveTo(obs.x, obs.y + obs.height); ctx.lineTo(obs.x + obs.width / 2, obs.y); ctx.lineTo(obs.x + obs.width, obs.y + obs.height); }
                ctx.fill();
            });
            drawCat();
        }

        function gameLoop() {
            update(); draw();
            if (gameActive) requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameActive = false;
            finalScoreLabel.innerText = `Score: ${score}`;
            restartScreen.classList.remove('hidden');
            isHoldingJump = false;
        }

        function handleInputStart(e) {
            if (e) e.preventDefault();
            isHoldingJump = true;
            if (levels[currentLevelIndex].mode === 'cube' && cat.isGrounded && gameActive) {
                cat.velocityY = JUMP_FORCE;
            }
        }

        function handleInputEnd() { isHoldingJump = false; }

        // --- IMPROVED FULLSCREEN TOGGLE ---
        function toggleFullscreen() {
            errorMsg.classList.add('hidden'); // Hide errors first

            if (!document.fullscreenElement && 
                !document.webkitFullscreenElement && 
                !document.mozFullScreenElement && 
                !document.msFullscreenElement) {
                
                // We try all the different browser "languages"
                const requestFS = gameContainer.requestFullscreen || 
                                gameContainer.webkitRequestFullscreen || 
                                gameContainer.mozRequestFullScreen || 
                                gameContainer.msRequestFullscreen;
                
                if (requestFS) {
                    requestFS.call(gameContainer).catch(err => {
                        errorMsg.classList.remove('hidden');
                        console.log(`Fullscreen error: ${err.message}`);
                    });
                }
            } else {
                // Exit logic in all languages too
                const exitFS = document.exitFullscreen || 
                             document.webkitExitFullscreen || 
                             document.mozCancelFullScreen || 
                             document.msExitFullscreen;
                
                if (exitFS) {
                    exitFS.call(document);
                }
            }
        }

        function handleResize() {
            const isFullscreen = !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
            
            if (isFullscreen) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight - 100;
            } else {
                canvas.width = Math.min(window.innerWidth - 40, 800);
                canvas.height = 400;
            }
            
            // Keep cat on the floor!
            cat.y = canvas.height - GROUND_HEIGHT - cat.height;
        }

        window.addEventListener('keydown', (e) => { if (e.code === 'Space' || e.code === 'ArrowUp') handleInputStart(e); });
        window.addEventListener('keyup', (e) => { if (e.code === 'Space' || e.code === 'ArrowUp') handleInputEnd(); });
        canvas.addEventListener('touchstart', handleInputStart);
        canvas.addEventListener('touchend', handleInputEnd);
        canvas.addEventListener('mousedown', handleInputStart);
        window.addEventListener('mouseup', handleInputEnd);
        restartBtn.addEventListener('click', init);
        
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        
        window.addEventListener('resize', handleResize);
        document.addEventListener('fullscreenchange', handleResize);
        document.addEventListener('webkitfullscreenchange', handleResize);
        document.addEventListener('mozfullscreenchange', handleResize);
        document.addEventListener('MSFullscreenChange', handleResize);

        window.onload = init;
    </script>
</body>
</html>
