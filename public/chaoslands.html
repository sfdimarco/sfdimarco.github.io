<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos Lands — Mook DiMarco</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:#000;overflow:hidden;touch-action:none;font-family:'Courier New',monospace;}
        canvas{display:block;}
        #ui{position:fixed;top:20px;left:50%;transform:translateX(-50%);color:white;font-size:28px;font-weight:900;text-align:center;z-index:10;pointer-events:none;}
        #sub{font-size:10px;color:#ff4444;letter-spacing:5px;text-transform:uppercase;animation:blink .1s infinite;}
        @keyframes blink{0%{opacity:1}50%{opacity:.7}100%{opacity:1}}
        .overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;color:white;text-align:center;padding:20px;}
        .hidden{display:none!important;}
        .btn{background:white;color:black;border:none;padding:16px 40px;border-radius:12px;font-weight:900;font-size:16px;cursor:pointer;margin:8px;letter-spacing:2px;}
        .btn-retry{background:#1a1a2e;color:white;border:1px solid #444;}
        .back-btn{position:fixed;top:16px;left:16px;background:rgba(0,0,0,.8);border:1px solid #00f2ff;color:#00f2ff;padding:8px 16px;border-radius:6px;text-decoration:none;font-family:monospace;font-size:12px;letter-spacing:2px;z-index:30;}
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← BACK</a>
    <div id="ui"><div id="pct">0%</div><div id="sub">HOLD SPACE / TAP TO FLY</div></div>
    <canvas id="c"></canvas>
    <div id="menu" class="overlay">
        <h1 style="font-size:36px;font-style:italic;margin-bottom:8px;">CHAOS LANDS</h1>
        <p style="color:#00f2ff;font-size:11px;letter-spacing:4px;margin-bottom:24px;">REACH 100% OR HIT THE WALL</p>
        <button class="btn" onclick="launch()">LAUNCH ENGINE</button>
        <a href="index.html" style="color:#555;font-size:12px;margin-top:16px;">← Portfolio</a>
    </div>
    <div id="over" class="overlay hidden">
        <h2 style="font-size:56px;font-style:italic;color:white;" id="over-title">WALL IMPACT</h2>
        <p style="font-size:40px;font-weight:900;" id="over-pct">0%</p>
        <div style="display:flex;gap:12px;margin-top:24px;">
            <button class="btn" onclick="launch()">RETRY</button>
            <button class="btn btn-retry" onclick="showMenu()">MENU</button>
        </div>
    </div>
    <script>
        const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
        let W,H,raf,gameState='menu';
        const BASE_SPEED=5,NIGHTMARE_SPEED=8,TARGET=BASE_SPEED*60*150;
        let g={worldX:0,frame:0,player:{x:220,y:0,isUp:false,velY:0,mode:'WAVE',dead:false,invuln:0},obstacles:[],saws:[],jumpPads:[],trail:[],particles:[],shake:0,isNightmare:false,flash:0,breakTimer:0,lastBreak:0};
        function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;if(g.player)g.player.x=W*0.3;}
        window.addEventListener('resize',resize);resize();
        function initLevel(){g={worldX:0,frame:0,player:{x:W*0.3,y:H/2,isUp:false,velY:0,mode:'WAVE',dead:false,invuln:0},obstacles:[],saws:[],jumpPads:[],trail:[],particles:[],shake:0,isNightmare:false,flash:0,breakTimer:0,lastBreak:0};
        const chunks=Math.ceil(TARGET/600)+10;for(let i=0;i<chunks;i++){const x=1200+i*600,p=Math.floor(x/TARGET*100),mid=Math.sin(i*.4)*(H*.15)+H/2;if(p>0&&p%25===0)continue;if(p>47&&p<53)continue;let gap=p<20?270:150;g.obstacles.push({x,y:0,w:100,h:mid-gap/2});g.obstacles.push({x,y:mid+gap/2,w:100,h:H});g.saws.push({x:x+180,y:mid+(Math.random()-.5)*200,r:42});}}
        function launch(){document.getElementById('menu').classList.add('hidden');document.getElementById('over').classList.add('hidden');initLevel();gameState='playing';if(raf)cancelAnimationFrame(raf);loop();}
        function showMenu(){if(raf)cancelAnimationFrame(raf);gameState='menu';document.getElementById('menu').classList.remove('hidden');}
        function boom(){const{x,y}=g.player;g.shake=80;g.flash=1;for(let i=0;i<100;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*20+8;g.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,size:Math.random()*10+3,life:1,color:`hsl(${Math.random()*360},100%,50%)`});}}
        function die(){if(g.player.dead)return;g.player.dead=true;boom();const p=Math.floor(g.worldX/TARGET*100);document.getElementById('over-pct').innerText=p+'%';document.getElementById('over-title').innerText=p>=100?'YOU WIN!':'WALL IMPACT';setTimeout(()=>{document.getElementById('over').classList.remove('hidden');},2000);}
        function loop(){if(gameState!=='playing'){return;}g.frame++;const cs=g.isNightmare?NIGHTMARE_SPEED:BASE_SPEED;const p=Math.floor(g.worldX/TARGET*100);document.getElementById('pct').innerText=p+'%';if(p>=100&&!g.player.dead){g.player.dead=true;document.getElementById('over-pct').innerText='100%';document.getElementById('over-title').innerText='YOU WIN! 🎉';setTimeout(()=>document.getElementById('over').classList.remove('hidden'),1500);}
        if(p>0&&p%25===0&&g.lastBreak!==p){g.breakTimer=360;g.lastBreak=p;}
        if(!g.player.dead){if(g.breakTimer>0){g.breakTimer--;g.player.invuln=10;}else g.worldX+=cs;g.player.y+=(g.player.isUp?-1:1)*cs*1.9;g.player.y=Math.max(10,Math.min(H-10,g.player.y));}
        if(g.player.invuln>0)g.player.invuln--;
        if(!g.player.dead){g.trail.push({x:g.player.x,y:g.player.y});if(g.trail.length>40)g.trail.shift();}
        if(g.shake>0)g.shake*=0.9;if(g.flash>0)g.flash-=0.04;
        ctx.save();ctx.translate((Math.random()-.5)*g.shake,(Math.random()-.5)*g.shake);
        ctx.fillStyle='#0f0f1b';ctx.fillRect(-100,-100,W+200,H+200);
        const hue=(g.frame*4)%360;
        g.obstacles.forEach(o=>{const dx=o.x-g.worldX+g.player.x;if(dx>W+100||dx<-200)return;if(g.isNightmare){ctx.fillStyle='#000';ctx.fillRect(dx,o.y,o.w,o.h);ctx.fillStyle='#4a0000';ctx.fillRect(dx+5,o.y+5,o.w-10,o.h-10);ctx.strokeStyle='#ff0000';ctx.lineWidth=4;ctx.shadowBlur=15;ctx.shadowColor='#ff0000';ctx.strokeRect(dx+2,o.y+2,o.w-4,o.h-4);}else{ctx.fillStyle='#1a1a2e';ctx.strokeStyle=`hsl(${hue},100%,50%)`;ctx.lineWidth=3;ctx.fillRect(dx,o.y,o.w,o.h);ctx.strokeRect(dx,o.y,o.w,o.h);}ctx.shadowBlur=0;
        if(!g.player.dead&&g.player.invuln<=0&&g.player.x+14>dx&&g.player.x-14<dx+o.w&&g.player.y+14>o.y&&g.player.y-14<o.y+o.h)die();});
        g.saws.forEach(s=>{const dx=s.x-g.worldX+g.player.x;if(dx>W+100||dx<-100)return;ctx.save();ctx.translate(dx,s.y);ctx.rotate(g.frame*(g.isNightmare?.5:.2));ctx.strokeStyle=g.isNightmare?'#ff0000':`hsl(${hue},100%,50%)`;ctx.lineWidth=6;ctx.beginPath();for(let i=0;i<10;i++){const r=i%2===0?s.r:s.r*.5,a=Math.PI*2/10*i;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}ctx.closePath();ctx.stroke();ctx.restore();if(!g.player.dead&&g.player.invuln<=0&&Math.hypot(g.player.x-dx,g.player.y-s.y)<s.r*.8)die();});
        // Trail
        ctx.beginPath();ctx.strokeStyle='#00f2ff';ctx.lineWidth=16;ctx.globalAlpha=.4;ctx.shadowBlur=30;ctx.shadowColor='#00f2ff';if(g.trail.length>0){ctx.moveTo(g.player.x,g.player.y);g.trail.forEach((t,i)=>ctx.lineTo(g.player.x-(g.trail.length-i)*6,t.y+(Math.random()-.5)*25));}ctx.stroke();
        ctx.beginPath();ctx.strokeStyle="white";ctx.lineWidth=4;ctx.globalAlpha=1;ctx.shadowBlur=0;if(g.trail.length>0){ctx.moveTo(g.player.x,g.player.y);g.trail.forEach((t,i)=>ctx.lineTo(g.player.x-(g.trail.length-i)*6,t.y+(Math.random()-.5)*8));}ctx.stroke();
        // Particles
        g.particles.forEach((pt,i)=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=.25;pt.life-=.012;ctx.fillStyle=pt.color;ctx.globalAlpha=pt.life;ctx.fillRect(pt.x-pt.size/2,pt.y-pt.size/2,pt.size,pt.size);if(pt.life<=0)g.particles.splice(i,1);});ctx.globalAlpha=1;
        if(p>=50||g.isNightmare){const pulse=(Math.sin(g.frame*.2)+1)*.15;ctx.fillStyle=`rgba(80,0,0,${.3+pulse})`;ctx.fillRect(-100,-100,W+200,H+200);}
        if(!g.player.dead){ctx.save();ctx.translate(g.player.x,g.player.y);ctx.rotate(g.player.isUp?-.4:.4);ctx.fillStyle='white';ctx.beginPath();ctx.moveTo(15,0);ctx.lineTo(-12,-10);ctx.lineTo(-12,10);ctx.closePath();ctx.fill();ctx.strokeStyle='#00f2ff';ctx.lineWidth=3;ctx.stroke();ctx.restore();}
        if(g.flash>0){ctx.fillStyle=`rgba(255,255,255,${g.flash})`;ctx.fillRect(-100,-100,W+200,H+200);}
        ctx.restore();raf=requestAnimationFrame(loop);}
        window.addEventListener('keydown',e=>{if(e.code==='Space'){g.player.isUp=true;if(gameState==='playing')e.preventDefault();}});
        window.addEventListener('keyup',e=>{if(e.code==='Space')g.player.isUp=false;});
        window.addEventListener('mousedown',()=>{if(gameState==='playing')g.player.isUp=true;});
        window.addEventListener('mouseup',()=>g.player.isUp=false);
        window.addEventListener('touchstart',e=>{if(e.target.tagName!=='BUTTON'&&e.target.tagName!=='A'){e.preventDefault();if(gameState==='playing')g.player.isUp=true;}},{passive:false});
        window.addEventListener('touchend',()=>g.player.isUp=false);
    </script>
</body>
</html>
